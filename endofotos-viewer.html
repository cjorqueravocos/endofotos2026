<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EndoFotos — EndoFocus 2026</title>
<style>
  * { box-sizing:border-box; margin:0; padding:0; }

  body {
    background: #0e2035;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    font-family: sans-serif;
  }

  /* Fondo con la plantilla de EndoFocus */
  #bg {
    position: fixed;
    inset: 0;
    background-image: url('./PANTALLA_ENDOFOTOS.png');
    background-size: cover;
    background-position: center;
    z-index: 0;
  }

  /* Área de fotos: lado derecho, dejando el logo libre */
  /* La pantalla es 2:1. El logo ocupa ~30% izquierdo.
     Las fotos van en el 60% derecho con margen generoso */
  #photo-area {
    position: fixed;
    top: 6%;
    left: 42%;
    width: 52%;
    height: 88%;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .slide {
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 1.2s ease;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .slide.active { opacity: 1; }

  .slide img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    border-radius: 6px;
    box-shadow: 0 8px 48px rgba(0,0,0,0.5);
  }

  /* Barra de progreso sutil */
  #progress {
    position: fixed;
    bottom: 0;
    left: 42%;
    height: 2px;
    background: #e8c84a;
    opacity: 0.5;
    z-index: 20;
    transition: width linear;
    display: none;
  }

  /* Dots indicadores */
  #dots {
    position: fixed;
    bottom: 14px;
    left: 42%;
    right: 4%;
    display: flex;
    justify-content: center;
    gap: 5px;
    z-index: 20;
    display: none;
  }

  .dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    transition: all 0.3s;
  }

  .dot.active {
    background: #e8c84a;
    width: 16px;
    border-radius: 3px;
  }

  /* Estado vacío */
  #empty {
    position: fixed;
    top: 6%; left: 42%; width: 52%; height: 88%;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    z-index: 10;
    color: rgba(255,255,255,0.2);
    font-size: 13px;
    letter-spacing: 1px;
  }
</style>
</head>
<body>

<div id="bg"></div>
<div id="photo-area" id="slides-container"></div>
<div id="progress"></div>
<div id="dots"></div>
<div id="empty">SIN FOTOS AÚN</div>

<script>
  // ── CONFIG (editable en endofotos-config.js) ──
  const API_KEY    = 'AIzaSyDKeLIjLEIcE2eFDpJd887KbgR4tq-1FpY';
  const FOLDER_D1  = '17XX4HT1HyYtEvTww4C-nbv9IjGh9LrTn';
  const FOLDER_D2  = '1PKJZmEaHA9Ih6ClPeOxNibxTBaCUGsiw';
  let   INTERVAL   = 7000;   // ms entre fotos — MODIFICABLE
  let   AUTO_REFRESH = 60000; // ms entre actualizaciones de Drive
  let   SHUFFLE    = true;

  let photos = [];
  let current = 0;
  let timer = null;
  let refreshTimer = null;

  async function fetchFolder(folderId) {
    const url = `https://www.googleapis.com/drive/v3/files?q='${folderId}'+in+parents+and+mimeType+contains+'image/'+and+trashed=false&fields=files(id,name,createdTime)&orderBy=createdTime+desc&pageSize=200&key=${API_KEY}`;
    const res = await fetch(url);
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    return (data.files || []).map(f => ({
      id: f.id,
      url: `https://drive.google.com/thumbnail?id=${f.id}&sz=w1600`
    }));
  }

  async function loadPhotos(silent) {
    try {
      const [d1, d2] = await Promise.all([fetchFolder(FOLDER_D1), fetchFolder(FOLDER_D2)]);
      const all = [...d1, ...d2];
      if (all.length !== photos.length) {
        photos = all;
        if (SHUFFLE) shuffle(photos);
        buildSlides();
        rebuildDots();
        if (!silent || current === 0) showSlide(0);
      }
    } catch(e) { console.warn('Drive error:', e); }
  }

  function shuffle(arr) {
    for (let i = arr.length-1; i > 0; i--) {
      const j = Math.floor(Math.random()*(i+1));
      [arr[i],arr[j]] = [arr[j],arr[i]];
    }
  }

  function buildSlides() {
    const area = document.getElementById('photo-area');
    area.innerHTML = '';
    if (photos.length === 0) {
      document.getElementById('empty').style.display = 'flex';
      return;
    }
    document.getElementById('empty').style.display = 'none';
    photos.forEach(p => {
      const div = document.createElement('div');
      div.className = 'slide';
      const img = document.createElement('img');
      img.src = p.url;
      div.appendChild(img);
      area.appendChild(div);
    });
  }

  function rebuildDots() {
    const dots = document.getElementById('dots');
    const max = Math.min(photos.length, 16);
    dots.innerHTML = '';
    for (let i = 0; i < max; i++) {
      const d = document.createElement('div');
      d.className = 'dot' + (i === current ? ' active' : '');
      dots.appendChild(d);
    }
  }

  function showSlide(idx) {
    document.querySelectorAll('.slide').forEach((s,i) => s.classList.toggle('active', i===idx));
    document.querySelectorAll('.dot').forEach((d,i) => d.classList.toggle('active', i===idx));
    current = idx;
    startProgress();
    clearTimeout(timer);
    if (photos.length > 1) timer = setTimeout(() => showSlide((current+1)%photos.length), INTERVAL);
  }

  function startProgress() {
    const bar = document.getElementById('progress');
    bar.style.transition = 'none';
    bar.style.width = '0%';
    bar.style.right = (100 - (42 + 52 - 4)) + '%';
    setTimeout(() => {
      bar.style.transition = `width ${INTERVAL}ms linear`;
      bar.style.width = '52%';
    }, 50);
  }

  // Init
  loadPhotos(false);
  refreshTimer = setInterval(() => loadPhotos(true), AUTO_REFRESH);
</script>
</body>
</html>
