<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EndoFotos Cierre — EndoFocus 2026</title>
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:#0e2035; width:100vw; height:100vh; overflow:hidden; font-family:sans-serif; }

  #bg {
    position:fixed; inset:0;
    background-image: url('PANTALLA_ENDOFOTOS.png');
    background-size:cover; background-position:center; z-index:0;
  }

  #photo-area {
    position:fixed; top:6%; left:42%; width:52%; height:88%;
    z-index:10; display:flex; align-items:center; justify-content:center;
  }

  .slide { position:absolute; inset:0; opacity:0; transition:opacity 1s ease; display:flex; align-items:center; justify-content:center; }
  .slide.active { opacity:1; }
  .slide img { max-width:100%; max-height:100%; object-fit:contain; border-radius:6px; box-shadow:0 8px 48px rgba(0,0,0,0.5); }

  #empty {
    position:fixed; top:6%; left:42%; width:52%; height:88%;
    display:none; flex-direction:column; align-items:center; justify-content:center;
    gap:12px; z-index:10; color:rgba(255,255,255,0.2); font-size:13px; letter-spacing:1px;
  }
</style>
</head>
<body>

<div id="bg"></div>
<div id="photo-area"></div>
<div id="empty">SIN FOTOS AÚN</div>

<script>
  const API_KEY     = 'AIzaSyDKeLIjLEIcE2eFDpJd887KbgR4tq-1FpY';
  const FOLDER_CIERRE = '1MVXbsxVD-AUdUNaTgEcHPtz-Vi9ZgSDB';
  let INTERVAL      = 4000;   // ms entre fotos — más rápido para el cierre
  let AUTO_REFRESH  = 60000;
  let SHUFFLE       = true;

  let photos = [];
  let current = 0;
  let timer = null;

  async function fetchFolder(folderId) {
    const url = `https://www.googleapis.com/drive/v3/files?q='${folderId}'+in+parents+and+mimeType+contains+'image/'+and+trashed=false&fields=files(id,name,createdTime)&orderBy=createdTime+desc&pageSize=200&key=${API_KEY}`;
    const res = await fetch(url);
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    return (data.files || []).map(f => ({
      id: f.id,
      url: `https://drive.google.com/thumbnail?id=${f.id}&sz=w1600`
    }));
  }

  async function loadPhotos(silent) {
    try {
      const all = await fetchFolder(FOLDER_CIERRE);
      if (all.length !== photos.length) {
        photos = all;
        if (SHUFFLE) shuffle(photos);
        buildSlides();
        if (!silent || current === 0) showSlide(0);
      }
    } catch(e) { console.warn('Drive error:', e); }
  }

  function shuffle(arr) {
    for (let i = arr.length-1; i > 0; i--) {
      const j = Math.floor(Math.random()*(i+1));
      [arr[i],arr[j]] = [arr[j],arr[i]];
    }
  }

  function buildSlides() {
    const area = document.getElementById('photo-area');
    area.innerHTML = '';
    if (photos.length === 0) { document.getElementById('empty').style.display = 'flex'; return; }
    document.getElementById('empty').style.display = 'none';
    photos.forEach(p => {
      const div = document.createElement('div');
      div.className = 'slide';
      const img = document.createElement('img');
      img.src = p.url;
      div.appendChild(img);
      area.appendChild(div);
    });
  }

  function showSlide(idx) {
    document.querySelectorAll('.slide').forEach((s,i) => s.classList.toggle('active', i===idx));
    current = idx;
    clearTimeout(timer);
    if (photos.length > 1) timer = setTimeout(() => showSlide((current+1)%photos.length), INTERVAL);
  }

  // Leer config guardada desde endofotos-cierre-config
  const saved = localStorage.getItem('ef_cierre_speed');
  if (saved) INTERVAL = parseInt(saved) * 1000;

  loadPhotos(false);
  setInterval(() => loadPhotos(true), AUTO_REFRESH);
</script>
</body>
</html>
