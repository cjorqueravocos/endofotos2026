<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EndoFotos Cierre — Configuración</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root { --bg:#0d1117; --surface:#161b22; --border:#21262d; --accent:#e8c84a; --text:#e6edf3; --muted:#7d8590; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--text); font-family:'Sora',sans-serif; min-height:100vh; padding:40px 24px; }
  .container { max-width:560px; margin:0 auto; }
  .header { display:flex; align-items:center; gap:12px; margin-bottom:36px; }
  .logo-mark { width:36px; height:36px; background:var(--accent); border-radius:8px; display:flex; align-items:center; justify-content:center; font-family:'DM Mono',monospace; font-size:12px; font-weight:500; color:#0d1117; }
  .logo-text { font-size:18px; font-weight:700; letter-spacing:-0.3px; }
  .logo-text span { color:var(--accent); }
  .logo-sub { font-size:11px; color:var(--muted); }
  .badge { display:inline-block; background:rgba(232,200,74,0.12); border:1px solid rgba(232,200,74,0.25); color:var(--accent); font-size:10px; font-weight:600; padding:3px 10px; border-radius:20px; margin-left:8px; letter-spacing:0.5px; }
  .card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:24px; margin-bottom:16px; }
  .card-title { font-size:13px; font-weight:600; margin-bottom:16px; display:flex; align-items:center; gap:8px; }
  .card-title span { color:var(--accent); }
  .field { margin-bottom:16px; }
  .field label { display:block; font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.8px; color:var(--muted); margin-bottom:6px; }
  .field select { width:100%; background:#0d1117; border:1px solid var(--border); border-radius:7px; padding:10px 12px; color:var(--text); font-size:12px; font-family:'Sora',sans-serif; }
  .field .hint { font-size:11px; color:var(--muted); margin-top:5px; line-height:1.5; }
  .range-row { display:flex; align-items:center; gap:12px; }
  .range-row input[type=range] { flex:1; accent-color:var(--accent); }
  .range-val { font-family:'DM Mono',monospace; font-size:13px; color:var(--accent); min-width:40px; text-align:right; }
  .status-card { background:rgba(232,200,74,0.06); border:1px solid rgba(232,200,74,0.18); border-radius:10px; padding:14px 16px; margin-bottom:16px; }
  .status-row { display:flex; align-items:center; justify-content:space-between; }
  .status-label { font-size:12px; color:var(--muted); }
  .status-val { font-family:'DM Mono',monospace; font-size:12px; color:var(--accent); }
  .btn-save { width:100%; padding:12px; background:var(--accent); color:#0d1117; border:none; border-radius:8px; font-size:14px; font-weight:700; cursor:pointer; font-family:'Sora',sans-serif; transition:background 0.2s; margin-top:4px; }
  .btn-save:hover { background:#f0d45a; }
  .btn-preview { width:100%; padding:10px; background:transparent; color:var(--muted); border:1px solid var(--border); border-radius:8px; font-size:13px; cursor:pointer; font-family:'Sora',sans-serif; transition:all 0.2s; margin-top:8px; }
  .btn-preview:hover { border-color:var(--accent); color:var(--accent); }
  .toast { position:fixed; bottom:24px; right:24px; background:var(--surface); border:1px solid var(--accent); border-radius:10px; padding:12px 20px; font-size:13px; font-weight:600; color:var(--accent); opacity:0; transition:opacity 0.3s; pointer-events:none; font-family:'DM Mono',monospace; }
  .toast.show { opacity:1; }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="logo-mark">EF</div>
    <div>
      <div class="logo-text">Endo<span>Fotos</span> <span class="badge">CIERRE</span></div>
      <div class="logo-sub">Configuración del slideshow de cierre — EndoFocus 2026</div>
    </div>
  </div>

  <div class="status-card">
    <div class="status-row">
      <span class="status-label">Fotos en carpeta de cierre</span>
      <span class="status-val" id="count-cierre">cargando...</span>
    </div>
  </div>

  <div class="card">
    <div class="card-title"><span>⏱</span> Velocidad del slideshow</div>
    <div class="field">
      <label>Segundos por foto</label>
      <div class="range-row">
        <input type="range" id="speed-range" min="2" max="15" value="4" step="1" oninput="document.getElementById('speed-val').textContent=this.value+'s'">
        <div class="range-val" id="speed-val">4s</div>
      </div>
      <div class="hint">Para el discurso de cierre se recomienda 3-5 segundos para que las fotos acompañen el ritmo del discurso.</div>
    </div>
  </div>

  <button class="btn-save" onclick="saveConfig()">Guardar configuración</button>
  <button class="btn-preview" onclick="window.open('endofotos-cierre-viewer.html','_blank')">▶ Abrir visualizador de cierre</button>

</div>

<div class="toast" id="toast"></div>

<script>
  const API_KEY = 'AIzaSyDKeLIjLEIcE2eFDpJd887KbgR4tq-1FpY';
  const FOLDER  = '1MVXbsxVD-AUdUNaTgEcHPtz-Vi9ZgSDB';

  async function loadCount() {
    try {
      const url = `https://www.googleapis.com/drive/v3/files?q='${FOLDER}'+in+parents+and+mimeType+contains+'image/'+and+trashed=false&fields=files(id)&key=${API_KEY}`;
      const res = await fetch(url);
      const data = await res.json();
      document.getElementById('count-cierre').textContent = (data.files||[]).length + ' fotos';
    } catch(e) {
      document.getElementById('count-cierre').textContent = 'error';
    }
  }

  function saveConfig() {
    const speed = document.getElementById('speed-range').value;
    localStorage.setItem('ef_cierre_speed', speed);
    showToast('Configuración guardada ✓');
    loadCount();
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  const saved = localStorage.getItem('ef_cierre_speed');
  if (saved) {
    document.getElementById('speed-range').value = saved;
    document.getElementById('speed-val').textContent = saved + 's';
  }

  loadCount();
  setInterval(loadCount, 60000);
</script>
</body>
</html>
